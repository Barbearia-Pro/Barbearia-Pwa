<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Barbearia Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="clientes.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="page-header">
        <a href="index.html" class="back-btn">← Voltar</a>
        <h2>👥 Clientes</h2>
    </header>

    <div class="container">
        <div class="form-section">
            <h3>Cadastrar Cliente</h3>
            <form id="formCliente">
                <div class="form-group">
                    <label for="nomeCliente">Nome Completo:</label>
                    <input type="text" id="nomeCliente" required placeholder="Nome do cliente">
                </div>
                <div class="form-group">
                    <label for="telefoneCliente">Telefone (WhatsApp):</label>
                    <input type="tel" id="telefoneCliente" required placeholder="(00) 00000-0000" maxlength="15">
                </div>
                <div class="form-group">
                    <label for="emailCliente">E-mail:</label>
                    <input type="email" id="emailCliente" placeholder="email@exemplo.com">
                </div>
                <div class="form-group">
                    <label for="nascimentoCliente">Data de Nascimento:</label>
                    <input type="date" id="nascimentoCliente">
                </div>
                <div class="form-group">
                    <label for="observacaoCliente">Observações:</label>
                    <textarea id="observacaoCliente" rows="3" placeholder="Preferências, alergias, etc."></textarea>
                </div>
                <button type="submit" class="btn-primary">Cadastrar Cliente</button>
            </form>
        </div>

        <div class="lista-section">
            <h3>Clientes Cadastrados</h3>
            <div class="search-box">
                <input type="text" id="buscaCliente" placeholder="🔍 Buscar cliente..." class="search-input">
            </div>
            <div id="listaClientes"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="clientes.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
