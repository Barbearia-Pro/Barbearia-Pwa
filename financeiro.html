<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Barbearia Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="financeiro.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="page-header">
        <a href="index.html" class="back-btn">← Voltar</a>
        <h2>💰 Financeiro</h2>
    </header>

    <div class="container">
        <div class="resumo-financeiro">
            <div class="card-financeiro">
                <h3>Faturamento Hoje</h3>
                <span id="faturamentoHoje" class="valor-destaque">R$ 0,00</span>
            </div>
            <div class="card-financeiro">
                <h3>Faturamento Mês</h3>
                <span id="faturamentoMes" class="valor-destaque">R$ 0,00</span>
            </div>
        </div>

        <div class="form-section">
            <h3>Registrar Pagamento</h3>
            <form id="formPagamento">
                <div class="form-group">
                    <label for="agendamentoPagamento">Agendamento:</label>
                    <select id="agendamentoPagamento" required>
                        <option value="">Selecione um agendamento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="formaPagamento">Forma de Pagamento:</label>
                    <select id="formaPagamento" required>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao_credito">Cartão de Crédito</option>
                        <option value="cartao_debito">Cartão de Débito</option>
                        <option value="pix">PIX</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Registrar Pagamento</button>
            </form>
        </div>

        <div class="lista-section">
            <h3>Transações do Dia</h3>
            <div class="filtro-data">
                <input type="date" id="filtroDataFinanceiro" class="date-input">
            </div>
            <div id="listaTransacoes"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="financeiro.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
