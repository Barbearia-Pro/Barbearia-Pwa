<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Barbearia Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="servicos.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="page-header">
        <a href="index.html" class="back-btn">← Voltar</a>
        <h2>💇 Serviços</h2>
    </header>

    <div class="container">
        <div class="form-section">
            <h3>Adicionar Serviço</h3>
            <form id="formServico">
                <div class="form-group">
                    <label for="nomeServico">Nome do Serviço:</label>
                    <input type="text" id="nomeServico" required placeholder="Ex: Corte Masculino">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="precoServico">Preço (R$):</label>
                        <input type="number" id="precoServico" required placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="duracaoServico">Duração (min):</label>
                        <input type="number" id="duracaoServico" required placeholder="30" min="5" max="180">
                    </div>
                </div>
                <div class="form-group">
                    <label for="descricaoServico">Descrição:</label>
                    <textarea id="descricaoServico" rows="3" placeholder="Descreva o serviço..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Adicionar Serviço</button>
            </form>
        </div>

        <div class="lista-section">
            <h3>Catálogo de Serviços</h3>
            <div id="listaServicos"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="servicos.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
